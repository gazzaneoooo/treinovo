<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treino PRO</title>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:10px; }
button { padding:8px; margin:4px; border:none; border-radius:8px; background:#c8f135; }
input { width:60px; margin:2px; }
.exercise { margin-bottom:20px; border-bottom:1px solid #333; padding-bottom:10px; }
.timer { position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
background:#000; padding:15px; border-radius:10px; display:none; text-align:center;}
</style>
</head>

<body>

<h2>Treino PRO</h2>

<!-- CRONÔMETRO TOTAL -->
<div>
<span id="tempoTotal">00:00</span><br>
<button onclick="startTreino()">▶️</button>
<button onclick="pauseTreino()">⏸</button>
<button onclick="resetTreino()">⏹</button>
</div>

<!-- EXERCÍCIO EXEMPLO -->
<div class="exercise" data-ex="supino" data-rest="60">
<h3>Supino</h3>

<input type="number" placeholder="Nº séries">
<button onclick="criarSeries(this)">Criar</button>

<div class="series-inputs"></div>
</div>

<button onclick="salvarTreino()">💾 Salvar treino</button>

<!-- TIMER DESCANSO -->
<div id="timerBox" class="timer">
<div id="timerCount">0</div>
<button onclick="pararTimer()">Parar</button>
</div>

<!-- GRÁFICO -->
<h3>📊 Evolução</h3>
<select id="seletorEx" onchange="atualizarGrafico()"></select>
<canvas id="grafico"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// ===== CRONÔMETRO TOTAL =====
let tempo = 0, rodando = false, intervalo;

function formatarTempo(seg){
let m = Math.floor(seg/60);
let s = seg%60;
return String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
}

function startTreino(){
if(rodando) return;
rodando = true;
intervalo = setInterval(()=>{
tempo++;
tempoTotal.innerText = formatarTempo(tempo);
},1000);
}

function pauseTreino(){ rodando=false; clearInterval(intervalo); }
function resetTreino(){ rodando=false; clearInterval(intervalo); tempo=0; tempoTotal.innerText="00:00"; }

// ===== CRIAR SÉRIES + SALVAR PADRÃO =====
function criarSeries(btn){
const ex = btn.closest('.exercise');
const total = parseInt(ex.querySelector('input').value);
const box = ex.querySelector('.series-inputs');

if(!total || total < 1) return;

box.innerHTML = "";
localStorage.setItem("series_"+ex.dataset.ex, total);

for(let i=1;i<=total;i++){
let div=document.createElement('div');
div.innerHTML = `S${i} Kg <input type='number'> Reps <input type='number'>
<button onclick="finalizarSerie(this)">OK</button>`;
box.appendChild(div);
}
}

// ===== TIMER DESCANSO =====
let tInt;
function iniciarTimer(s){
let t=s;
timerBox.style.display="block";
timerCount.innerText=t;

clearInterval(tInt);
tInt=setInterval(()=>{
t--;
timerCount.innerText=t;
if(t<=0){
clearInterval(tInt);
timerCount.innerText="🔥";

if(navigator.vibrate) navigator.vibrate(500);
let beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
beep.play();
}
},1000);
}

function finalizarSerie(btn){
let ex=btn.closest('.exercise');
iniciarTimer(parseInt(ex.dataset.rest) || 60);
}

function pararTimer(){
clearInterval(tInt);
timerBox.style.display="none";
}

// ===== SALVAR TREINO =====
function salvarTreino(){
let hist = JSON.parse(localStorage.getItem("hist"))||[];

document.querySelectorAll('.exercise').forEach(ex=>{
let series=[];
ex.querySelectorAll('.series-inputs div').forEach(r=>{
let i=r.querySelectorAll('input');
series.push({kg:+i[0].value,reps:+i[1].value});
});

hist.push({
ex:ex.dataset.ex,
data:new Date().toLocaleDateString(),
tempo:tempo,
series:series
});
});

localStorage.setItem("hist",JSON.stringify(hist));

mostrarResumo();
carregarExercicios();
atualizarGrafico();
}

// ===== RESUMO + EVOLUÇÃO =====
function mostrarResumo(){
let hist = JSON.parse(localStorage.getItem("hist"))||[];
let resumo = `⏱ Tempo: ${formatarTempo(tempo)}\n\n`;

document.querySelectorAll('.exercise').forEach(ex=>{
let exId = ex.dataset.ex;
let treinos = hist.filter(t=>t.ex===exId);

if(treinos.length < 2) return;

let atual = treinos.at(-1);
let anterior = treinos.at(-2);

let cargaAtual = atual.series.reduce((a,s)=>a+s.kg,0);
let cargaAnterior = anterior.series.reduce((a,s)=>a+s.kg,0);

let status = cargaAtual>cargaAnterior?"📈 Evolução":
cargaAtual<cargaAnterior?"📉 Regressão":"➡️ Estagnado";

resumo += `${exId.toUpperCase()} → ${status}\n`;
});

alert(resumo);
}

// ===== GRÁFICO POR EXERCÍCIO =====
let chart;

function carregarExercicios(){
let select=document.getElementById("seletorEx");
select.innerHTML="";

document.querySelectorAll('.exercise').forEach(ex=>{
let opt=document.createElement("option");
opt.value=ex.dataset.ex;
opt.textContent=ex.dataset.ex.toUpperCase();
select.appendChild(opt);
});
}

function atualizarGrafico(){
let ex=document.getElementById("seletorEx").value;

let hist = JSON.parse(localStorage.getItem("hist"))||[];
let data = hist.filter(t=>t.ex===ex);

let labels = data.map(t=>t.data);
let cargas = data.map(t=>t.series.reduce((a,s)=>a+s.kg,0));

if(chart) chart.destroy();

chart = new Chart(document.getElementById("grafico"),{
type:'line',
data:{
labels:labels,
datasets:[{label:ex.toUpperCase(),data:cargas}]
}
});
}

// ===== AUTO-PREENCHER =====
window.onload=()=>{
let hist = JSON.parse(localStorage.getItem("hist"))||[];

document.querySelectorAll('.exercise').forEach(ex=>{
let exId = ex.dataset.ex;

let last = hist.filter(t=>t.ex===exId).pop();
let savedSeries = localStorage.getItem("series_"+exId);

if(savedSeries){
ex.querySelector('input').value = savedSeries;
criarSeries(ex.querySelector('button'));
}

if(last){
let rows = ex.querySelectorAll('.series-inputs div');

rows.forEach((r,i)=>{
if(last.series[i]){
let inputs=r.querySelectorAll('input');
inputs[0].value=last.series[i].kg;
inputs[1].value=last.series[i].reps;
}
});
}
});

carregarExercicios();
atualizarGrafico();
};
</script>

</body>
</html>
